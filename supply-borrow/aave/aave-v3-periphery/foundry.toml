[profile.default]
src = "contracts"
out = "out"
libs = ["gitmodules"]
via_ir = true
optimizer_stack_size = 24 # 增加堆栈大小
solc_version = "0.8.28"

remappings = [
    "forge-std/=gitmodules/forge-std/src/",
    "@aave/core-v3/contracts/=gitmodules/aave-v3-core/contracts/",
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
